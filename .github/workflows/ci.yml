name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backups-validation:
    name: Fail Fast Backups PG18 Contract
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Install PostgreSQL 18 client tooling
      run: |
        sudo apt-get update
        sudo apt-get install -y ca-certificates curl gnupg
        distro_codename="$(
          . /etc/os-release
          echo "$VERSION_CODENAME"
        )"
        sudo install -d /usr/share/postgresql-common/pgdg
        curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
          | sudo gpg --dearmor -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
        echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] http://apt.postgresql.org/pub/repos/apt ${distro_codename}-pgdg main" \
          | sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null
        sudo apt-get update
        sudo apt-get install -y postgresql-client-18

    - name: Verify PostgreSQL 18 client tooling
      run: |
        pg_dump --version | grep "PostgreSQL) 18"
        pg_restore --version | grep "PostgreSQL) 18"

    - name: Install dependencies
      run: |
        poetry install --with dev

    - name: Run backups module validation tests
      run: |
        PYTHONPATH="quickscale_modules/backups:quickscale_modules/backups/src" \
          poetry run pytest quickscale_modules/backups/tests -q --no-cov \
            -p pytest_django --ds=tests.settings

  test:
    name: Run Tests (Unit + Integration)
    needs: backups-validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Poetry
      id: install-poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: true
      # Retry on SSL/network failures
      continue-on-error: true

    - name: Retry Poetry install (if failed)
      if: steps.install-poetry.outcome == 'failure'
      run: |
        for i in {1..3}; do
          curl -sSL https://install.python-poetry.org | python3 - && break || sleep 5
        done
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Cache Poetry dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pypoetry
          .venv
        key: ${{ runner.os }}-poetry-${{ hashFiles('poetry.lock') }}
        restore-keys: |
          ${{ runner.os }}-poetry-

    - name: Install dependencies
      run: |
        poetry install --with dev

    - name: Check for stale sub-package venvs
      run: |
        # Fail if any sub-package has a local .venv (should use root venv)
        # This prevents version drift between packages
        STALE_VENVS=$(find quickscale_core quickscale_cli quickscale quickscale_modules -maxdepth 2 -type d -name ".venv" 2>/dev/null || true)
        if [ -n "$STALE_VENVS" ]; then
          echo "ERROR: Found stale .venv directories in sub-packages:"
          echo "$STALE_VENVS"
          echo ""
          echo "Sub-packages must use the root monorepo venv to prevent version drift."
          echo "Delete these directories and use 'poetry install' from root instead."
          exit 1
        fi
        echo "✓ No stale .venv directories found"

    - name: Run linting (ruff)
      run: |
        poetry run ruff check quickscale_core quickscale_cli quickscale_modules
        echo "Running ruff format..."
        poetry run ruff format quickscale_core quickscale_cli quickscale_modules
        echo "Checking format..."
        poetry run ruff format --check quickscale_core quickscale_cli quickscale_modules

    - name: Run type checking (mypy)
      run: |
        poetry run mypy quickscale_core/src/
        poetry run mypy quickscale_cli/src/
        # Type check modules (each module may have its own stubs config)
        for mod in quickscale_modules/*/; do
          if [ -d "${mod}src" ]; then
            echo "Type checking ${mod}..."
            poetry run mypy "${mod}src/" || true
          fi
        done

    - name: Run tests (quickscale_core) - Unit & Integration only
      run: |
        poetry run pytest quickscale_core -m "not e2e" --cov=quickscale_core --cov-report=xml --cov-report=term --cov-fail-under=90

    - name: Run tests (quickscale_cli)
      run: |
        poetry run pytest quickscale_cli --cov=quickscale_cli --cov-report=xml --cov-report=term --cov-fail-under=90

    - name: Run module manifest contract tests
      run: |
        poetry run pytest quickscale_cli/tests/test_module_manifest_contract.py

    - name: Run tests (quickscale_modules)
      run: |
        # Test modules using centralized dependencies
        # PYTHONPATH set to module dir so tests.settings is importable
        for mod in quickscale_modules/*/; do
          if [ -d "${mod}tests" ]; then
            mod_name=$(basename "$mod")
            pkg_name="quickscale_modules_${mod_name}"
            echo "Testing module: $mod_name"
            PYTHONPATH="${mod}:${mod}src" poetry run pytest "${mod}tests/" \
              --cov="$pkg_name" --cov-report=term --cov-fail-under=90 \
              -p pytest_django --ds=tests.settings || true
          fi
        done

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      if: always() && github.ref == 'refs/heads/main'
      with:
        files: ./quickscale_core/coverage.xml,./quickscale_cli/coverage.xml
        flags: unittests,integration
        name: codecov-umbrella
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      continue-on-error: true

  lint-cli:
    name: Lint CLI Package
    needs: backups-validation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"

    - name: Install Poetry
      id: install-poetry-cli
      uses: snok/install-poetry@v1
      # Retry on SSL/network failures
      continue-on-error: true

    - name: Retry Poetry install (if failed)
      if: steps.install-poetry-cli.outcome == 'failure'
      run: |
        for i in {1..3}; do
          curl -sSL https://install.python-poetry.org | python3 - && break || sleep 5
        done
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: poetry install --with dev

    - name: Run linting
      run: |
        poetry run ruff check quickscale_cli
        echo "Running ruff format on quickscale_cli..."
        poetry run ruff format quickscale_cli
        echo "Checking format..."
        poetry run ruff format --check quickscale_cli

    - name: Run type checking
      run: |
        poetry run mypy quickscale_cli/src/
