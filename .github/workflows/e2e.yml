name: E2E Tests

on:
  # Manual trigger
  workflow_dispatch:

  # Run on release tags
  push:
    tags:
      - 'v*'

  # Optionally run on PRs to main (can be disabled)
  pull_request:
    branches: [ main ]
    paths:
      - 'quickscale_modules/backups/**'
      - 'quickscale_cli/src/quickscale_cli/commands/plan_command.py'
      - 'quickscale_cli/src/quickscale_cli/commands/apply_command.py'
      - 'quickscale_cli/tests/test_apply_command_extended.py'
      - 'quickscale_cli/tests/test_module_lifecycle_cycle.py'
      - 'quickscale_core/src/quickscale_core/generator/templates/Dockerfile.j2'
      - 'quickscale_core/src/quickscale_core/generator/templates/github/workflows/ci.yml.j2'
      - 'quickscale_core/tests/test_generator/test_templates.py'
      - 'quickscale_core/tests/test_html_theme_integration.py'
      - 'quickscale_core/tests/test_react_theme_integration.py'
      - 'quickscale_core/tests/test_integration.py'
      - 'quickscale_core/tests/test_e2e_full_workflow.py'
      - '.github/workflows/ci.yml'
      - '.github/workflows/e2e.yml'

jobs:
  e2e-tests:
    name: Full E2E Tests (PostgreSQL + Playwright)
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python 3.14
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Install system dependencies and PostgreSQL 18 client tooling
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          ca-certificates \
          curl \
          docker-compose
        distro_codename="$(
          . /etc/os-release
          echo "$VERSION_CODENAME"
        )"
        sudo install -d /usr/share/postgresql-common/pgdg
        sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
          -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
        echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] http://apt.postgresql.org/pub/repos/apt ${distro_codename}-pgdg main" \
          | sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null
        sudo apt-get update
        sudo apt-get install -y postgresql-client-18
        echo "/usr/lib/postgresql/18/bin" >> "$GITHUB_PATH"

    - name: Verify PostgreSQL 18 client tooling
      run: |
        test -x /usr/lib/postgresql/18/bin/pg_dump
        test -x /usr/lib/postgresql/18/bin/pg_restore
        test "$(command -v pg_dump)" = "/usr/lib/postgresql/18/bin/pg_dump"
        test "$(command -v pg_restore)" = "/usr/lib/postgresql/18/bin/pg_restore"
        /usr/lib/postgresql/18/bin/pg_dump --version | grep -F "(PostgreSQL) 18"
        /usr/lib/postgresql/18/bin/pg_restore --version | grep -F "(PostgreSQL) 18"

    - name: Cache Poetry dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/pypoetry
          .venv
        key: ${{ runner.os }}-poetry-e2e-${{ hashFiles('**/poetry.lock') }}
        restore-keys: |
          ${{ runner.os }}-poetry-e2e-

    - name: Install dependencies (quickscale_core)
      working-directory: ./quickscale_core
      run: |
        poetry install --with dev

    - name: Install Playwright browsers
      working-directory: ./quickscale_core
      run: |
        poetry run playwright install --with-deps chromium

    - name: Verify PostgreSQL connection
      run: |
        PGPASSWORD=test_password psql -h localhost -U test_user -d test_db -c "SELECT version();"

    - name: Run E2E tests
      working-directory: ./quickscale_core
      env:
        # Playwright configuration
        PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
      run: |
        poetry run pytest -m e2e \
          --verbose \
          --tb=short \
          --maxfail=3 \
          --cov=quickscale_core \
          --cov-report=xml \
          --cov-report=term-missing

    - name: Upload E2E test screenshots
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: e2e-screenshots
        path: |
          **/screenshots/
          **/*screenshot*.png
        retention-days: 7

    - name: Upload E2E coverage
      uses: codecov/codecov-action@v4
      if: always()
      with:
        files: ./quickscale_core/coverage.xml
        flags: e2e
        name: codecov-e2e
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      continue-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: e2e-test-results
        path: |
          quickscale_core/htmlcov/
          quickscale_core/coverage.xml
        retention-days: 30

  docker-build-test:
    name: Test Generated Project Docker Build
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python 3.14
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"

    - name: Install Poetry
      uses: snok/install-poetry@v1

    - name: Install QuickScale
      working-directory: ./quickscale_cli
      run: |
        poetry install

    - name: Generate test project
      run: |
        cd /tmp
        printf '\n2\n\ny\ny\nn\ny\n' | poetry -C $GITHUB_WORKSPACE/quickscale_cli run quickscale plan test_docker_project
        cd /tmp/test_docker_project
        printf 'y\n' | poetry -C $GITHUB_WORKSPACE/quickscale_cli run quickscale apply quickscale.yml --no-docker

    - name: Verify Dockerfile exists
      run: |
        test -f /tmp/test_docker_project/Dockerfile
        test -f /tmp/test_docker_project/docker-compose.yml

    - name: Verify generated CI workflow contract
      run: |
        grep -qF "runs-on: ubuntu-24.04" /tmp/test_docker_project/.github/workflows/ci.yml
        grep -qF "actions/checkout@v6" /tmp/test_docker_project/.github/workflows/ci.yml
        grep -qF "actions/setup-python@v6" /tmp/test_docker_project/.github/workflows/ci.yml
        grep -qF "apt.postgresql.org" /tmp/test_docker_project/.github/workflows/ci.yml
        grep -qF "apt.postgresql.org.asc" /tmp/test_docker_project/.github/workflows/ci.yml
        grep -qF "postgresql-client-18" /tmp/test_docker_project/.github/workflows/ci.yml
        grep -qF 'echo "/usr/lib/postgresql/18/bin" >> "$GITHUB_PATH"' /tmp/test_docker_project/.github/workflows/ci.yml
        grep -qF 'test -x /usr/lib/postgresql/18/bin/pg_dump' /tmp/test_docker_project/.github/workflows/ci.yml
        grep -qF 'test -x /usr/lib/postgresql/18/bin/pg_restore' /tmp/test_docker_project/.github/workflows/ci.yml
        grep -qF 'test "$(command -v pg_dump)" = "/usr/lib/postgresql/18/bin/pg_dump"' /tmp/test_docker_project/.github/workflows/ci.yml
        grep -qF 'test "$(command -v pg_restore)" = "/usr/lib/postgresql/18/bin/pg_restore"' /tmp/test_docker_project/.github/workflows/ci.yml
        grep -qF '/usr/lib/postgresql/18/bin/pg_dump --version | grep -F "(PostgreSQL) 18"' /tmp/test_docker_project/.github/workflows/ci.yml
        grep -qF '/usr/lib/postgresql/18/bin/pg_restore --version | grep -F "(PostgreSQL) 18"' /tmp/test_docker_project/.github/workflows/ci.yml
        ! grep -qF "gpg --dearmor" /tmp/test_docker_project/.github/workflows/ci.yml

    - name: Validate docker-compose configuration
      working-directory: /tmp/test_docker_project
      run: |
        docker-compose config

    - name: Build Docker image (no push)
      working-directory: /tmp/test_docker_project
      run: |
        docker build -t test_docker_project:test .

    - name: Verify image was created
      run: |
        docker images | grep test_docker_project

    - name: Verify generated image includes PostgreSQL 18 client tooling
      run: |
        docker run --rm test_docker_project:test pg_dump --version | grep "PostgreSQL) 18"
        docker run --rm test_docker_project:test pg_restore --version | grep "PostgreSQL) 18"
