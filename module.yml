name: backups
version: "0.77.0"
description: "Private operational database backups with admin workflows and guarded CLI restores"

config:
  mutable:
    retention_days:
      type: integer
      default: 14
      django_setting: QUICKSCALE_BACKUPS_RETENTION_DAYS
      description: "Number of days backup artifacts are retained before pruning."

    naming_prefix:
      type: string
      default: "db"
      django_setting: QUICKSCALE_BACKUPS_NAMING_PREFIX
      description: "Prefix used when generating backup filenames."

    target_mode:
      type: string
      default: "local"
      django_setting: QUICKSCALE_BACKUPS_TARGET_MODE
      description: "Backup target mode: local or private_remote."
      validation:
        choices: ["local", "private_remote"]

    local_directory:
      type: string
      default: ".quickscale/backups"
      django_setting: QUICKSCALE_BACKUPS_LOCAL_DIRECTORY
      description: "Private local directory used for stored backup artifacts."

    remote_bucket_name:
      type: string
      default: ""
      django_setting: QUICKSCALE_BACKUPS_REMOTE_BUCKET_NAME
      description: "Private S3-compatible bucket used when private_remote mode is enabled."

    remote_prefix:
      type: string
      default: "backups/private"
      django_setting: QUICKSCALE_BACKUPS_REMOTE_PREFIX
      description: "Object-key prefix for private remote backup artifacts."

    remote_endpoint_url:
      type: string
      default: ""
      django_setting: QUICKSCALE_BACKUPS_REMOTE_ENDPOINT_URL
      description: "Optional custom S3-compatible endpoint URL."

    remote_region_name:
      type: string
      default: ""
      django_setting: QUICKSCALE_BACKUPS_REMOTE_REGION_NAME
      description: "Cloud provider region (or auto for endpoint-driven providers)."

    remote_access_key_id_env_var:
      type: string
      default: ""
      django_setting: QUICKSCALE_BACKUPS_REMOTE_ACCESS_KEY_ID_ENV_VAR
      description: "Environment-variable name containing the private remote access key id."

    remote_secret_access_key_env_var:
      type: string
      default: ""
      django_setting: QUICKSCALE_BACKUPS_REMOTE_SECRET_ACCESS_KEY_ENV_VAR
      description: "Environment-variable name containing the private remote secret access key."

    automation_enabled:
      type: boolean
      default: false
      django_setting: QUICKSCALE_BACKUPS_AUTOMATION_ENABLED
      description: "Document whether cron or platform schedulers should invoke backup commands."

    schedule:
      type: string
      default: "0 2 * * *"
      django_setting: QUICKSCALE_BACKUPS_SCHEDULE
      description: "Cron-like schedule documentation for command-driven backup automation."

dependencies:
  - django-storages>=1.14.6
  - boto3>=1.40.46

django_apps:
  - quickscale_modules_backups
