# Blog Module Manifest
# Defines configuration options and their mutability for the blog module

name: blog
version: "0.73.0"
description: "Markdown-powered blog module"

config:
  mutable:
    posts_per_page:
      type: integer
      default: 10
      django_setting: BLOG_POSTS_PER_PAGE
      description: "Number of blog posts per page"

    enable_rss:
      type: boolean
      default: true
      django_setting: BLOG_ENABLE_RSS
      description: "Enable RSS routes at runtime"

  immutable: {}

dependencies:
  - django-markdownx>=4.0
  - Pillow>=12.1.1,<13.0.0

django_apps:
  - markdownx
  - quickscale_modules_blog
